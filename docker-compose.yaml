services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: meteocal
      MYSQL_USER: docker
      MYSQL_PASSWORD: docker
      MYSQL_ROOT_PASSWORD: docker
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: ['mysqld', '--character-set-server=utf8mb4', '--collation-server=utf8mb4_unicode_ci']
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-udocker", "-pdocker"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  glassfish:
    build:
      context: .
      dockerfile: Dockerfile.glassfish
    ports:
      - "4848:4848"
      - "8080:8080"
      - "8181:8181"
    environment:
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
